<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <link rel="manifest" href="manifest.json">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Foco"> 
    <link rel="apple-touch-icon" href="icon-192x192.png">

    <title>Foco Matinal</title>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="panic-overlay" class="hidden">
        <h2 id="breathe-text">Inspire (吸气)...</h2>
        <div class="breathing-circle"></div>
        <button id="close-panic-btn">Estou melhor (我好些了)</button>
    </div>

    <div id="app-container">
        <header id="app-header">
            <h1 id="vitality-display">Vitalidade: <span id="score-value">100</span></h1>
        </header>

        <main id="main-content">
            </main>

        <button id="panic-btn" class="fab-button" aria-label="Emergência">🆘</button>

        <nav id="bottom-bar">
            <button class="nav-item active" data-target="home">Início (首页)</button>
            <button class="nav-item" data-target="stats">Estatísticas (统计)</button>
            <button class="nav-item" data-target="premium">Premium (高级版)</button>
        </nav>
    </div>

    <script type="module" src="app.js"></script>
    
    <script>
        // Registrar Service Worker (注册 Service Worker)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker Registrado!', reg.scope))
                    .catch(err => console.error('Erro no Service Worker', err));
            });
        }
    </script>
</body>
</html>
